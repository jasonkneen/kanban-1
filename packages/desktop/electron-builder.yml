appId: com.cline.kanban
productName: Kanban
copyright: Copyright © 2025 Cline

# Directories
directories:
  output: out
  buildResources: build

# afterSign hook — notarizes the macOS .app bundle via Apple notarytool.
# Requires APPLE_ID, APPLE_ID_PASSWORD, and APPLE_TEAM_ID env vars.
# The hook is a no-op on non-mac platforms or when env vars are missing.
afterSign: ./scripts/notarize.cjs

# Files to include in the app bundle
files:
  - dist/**/*
  - package.json

# Custom protocol — registers kanban:// deep-links for OAuth callbacks.
# On macOS this ends up in the Info.plist CFBundleURLTypes; on Windows it
# registers the protocol in the registry; on Linux it creates the appropriate
# XDG mime handler.
protocols:
  - name: Kanban
    schemes:
      - kanban

# node-pty is a native addon that must be rebuilt for Electron's Node version.
# @electron/rebuild handles this via the postinstall hook (electron-builder install-app-deps).

# The child process entry point must be outside the asar archive so that
# child_process.fork() can access it directly. node-pty native bindings
# also need to be unpacked for the same reason. tree-kill is unpacked so
# that spawned helper processes can reliably kill grandchild process trees
# on Windows (where native pid-tree walking is needed).
asar: true
asarUnpack:
  - "**/runtime-child.js"
  - "**/node_modules/node-pty/**"
  - "**/node_modules/tree-kill/**"

# ──────────────────────────────────────────
# Auto-update: publish to GitHub Releases
# ──────────────────────────────────────────
# electron-updater reads this at build time to embed the update feed URL.
# At runtime, autoUpdater.checkForUpdates() fetches the latest release
# from the GitHub repo and compares versions.
#
# Code signing is configured separately (Tasks 3.2, 3.3).
publish:
  provider: github
  owner: cline
  repo: kanban
  releaseType: release

# ──────────────────────────────────────────
# macOS configuration
# ──────────────────────────────────────────
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  # dmg for user-facing download, zip for electron-updater's differential updates.
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Merge extra keys into the generated Info.plist.
  # NSAppSleepDisabled prevents App Nap from throttling background runtime work.
  extendInfo:
    NSAppSleepDisabled: true

dmg:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ──────────────────────────────────────────
# Windows configuration
# ──────────────────────────────────────────
# electron-builder will auto-convert build/icon.png → .ico when no .ico is
# present.  Provide a dedicated icon.ico in build/ for faster builds / CI
# that lacks image-conversion tools.
#
# Code Signing (EV / OV certificate):
#   electron-builder signs Windows executables and installers automatically
#   when the WIN_CSC_LINK and WIN_CSC_KEY_PASSWORD environment variables are
#   set. For standard OV (.pfx) certificates, set those two env vars.
#
#   For EV certificates backed by a cloud HSM (Azure Trusted Signing,
#   DigiCert KeyLocker, etc.), set WIN_CSC_LINK to an empty string and
#   instead provide the variables consumed by scripts/win-sign.cjs — which
#   is wired up below via `sign` — to delegate to the appropriate CLI tool.
#
#   The signing hook is a no-op when env vars are missing, so local dev
#   builds continue to work unsigned.
win:
  target:
    - target: nsis
      arch:
        - x64
  requestedExecutionLevel: asInvoker
  # icon is resolved from buildResources/icon.ico (or .png → auto-converted)

  # ── Code signing ──
  # Dual-hash for backward compat (sha1) + SmartScreen reputation (sha256).
  signingHashAlgorithms:
    - sha256
    - sha1
  # Sign all DLLs inside the app — needed for full SmartScreen trust.
  signDlls: true
  # Custom signing hook — delegates to signtool.exe or a cloud HSM tool
  # (Azure SignTool / DigiCert smctl) when EV cert env vars are present.
  # Falls back to electron-builder's built-in PFX signing otherwise.
  sign: ./scripts/win-sign.cjs
  # Publish timestamp server — embeds a countersignature so the signature
  # remains valid after the certificate expires.
  rfc3161TimeStampServer: "http://timestamp.acs.microsoft.com"
  timeStampServer: "http://timestamp.acs.microsoft.com"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  artifactName: "${productName}-Setup-${version}-${arch}.${ext}"
  # Shortcuts
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Kanban
  # Uninstaller
  deleteAppDataOnUninstall: false
  uninstallDisplayName: Kanban ${version}
  # Post-install behaviour
  runAfterFinish: true
  # Pack the elevator helper so electron-updater can request elevation later
  packElevateHelper: true
  # Unicode NSIS (default true, stated explicitly for clarity)
  unicode: true

# ──────────────────────────────────────────
# Linux configuration
# ──────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
  artifactName: "${productName}-${version}-${arch}.${ext}"
